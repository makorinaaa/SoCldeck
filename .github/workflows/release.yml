name: Release SocialDeck

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Validate release tag
        shell: pwsh
        run: |
          $packageVersion = node -p "require('./package.json').version"
          $tagVersion = "${{ github.ref_name }}" -replace '^v', ''
          if ($tagVersion -ne $packageVersion) {
            Write-Error "Tag version $tagVersion does not match package version $packageVersion"
            exit 1
          }
          "## SocialDeck v$packageVersion release" >> $env:GITHUB_STEP_SUMMARY
          "Tag and package versions match." >> $env:GITHUB_STEP_SUMMARY

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force test-results | Out-Null
          & npm.cmd test 2>&1 | Tee-Object -FilePath test-results/unit-tests.log
          $testExitCode = $LASTEXITCODE
          if ($testExitCode -ne 0) { exit $testExitCode }

      - name: Run Electron E2E tests
        shell: pwsh
        run: |
          $maxAttempts = 2
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            $logPath = "test-results/e2e-attempt-$attempt.log"
            & npm.cmd run test:e2e 2>&1 | Tee-Object -FilePath $logPath
            $testExitCode = $LASTEXITCODE
            if ($testExitCode -eq 0) {
              if ($attempt -gt 1) {
                Write-Output "::warning title=E2E retry::Electron E2E passed on attempt $attempt. Review the first-attempt log artifact."
              }
              break
            }
            if ($attempt -lt $maxAttempts) {
              Write-Output "::warning title=E2E retry::Electron E2E failed on attempt $attempt and will retry once."
              Start-Sleep -Seconds 5
            }
          }
          if ($testExitCode -ne 0) {
            "### Electron E2E failure" >> $env:GITHUB_STEP_SUMMARY
            "Attempt $attempt failed. The final log lines are included below." >> $env:GITHUB_STEP_SUMMARY
            '```text' >> $env:GITHUB_STEP_SUMMARY
            Get-Content -LiteralPath $logPath -Tail 80 >> $env:GITHUB_STEP_SUMMARY
            '```' >> $env:GITHUB_STEP_SUMMARY
            exit $testExitCode
          }

      - name: Upload test diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results-${{ github.run_attempt }}
          path: test-results/
          if-no-files-found: warn
          retention-days: 14

      - name: Build Windows release
        run: npm run build-win

      - name: Verify release artifacts
        shell: pwsh
        run: |
          $packageVersion = node -p "require('./package.json').version"
          $expectedArtifacts = @(
            "dist/SocialDeck-$packageVersion-x64.exe",
            "dist/SocialDeck-$packageVersion-x64.exe.blockmap",
            "dist/latest.yml"
          )
          $missingArtifacts = $expectedArtifacts | Where-Object {
            -not (Test-Path -LiteralPath $_ -PathType Leaf)
          }
          if ($missingArtifacts) {
            Write-Error "Missing release artifacts: $($missingArtifacts -join ', ')"
            exit 1
          }
          Get-Item $expectedArtifacts | Select-Object Name, Length

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          files: |
            dist/*.exe
            dist/*.exe.blockmap
            dist/latest.yml
